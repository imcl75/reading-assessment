<!DOCTYPE html>
<!-- login.html — unified pupil login, routes silently to correct assessment -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Reading Assessment — Who are you?</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root { --brand: #1798d3; --brand-dk: #0a6fa8; }
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  min-height: 100vh; font-family: 'Nunito', sans-serif;
  background: linear-gradient(160deg, #e8f5fd 0%, #b3dff5 100%);
  display: flex; flex-direction: column; align-items: center;
  justify-content: flex-start; padding: 28px 16px 48px;
}

.logo { font-size: 3rem; margin-bottom: 6px; text-align: center; }
h1 { color: var(--brand); font-size: 1.6rem; font-weight: 800; text-align: center; margin-bottom: 3px; }
.sub { color: #5a8fa8; font-size: 0.95rem; text-align: center; margin-bottom: 28px; }

.card {
  background: #fff; border-radius: 20px; padding: 32px 28px;
  max-width: 580px; width: 100%;
  box-shadow: 0 6px 32px rgba(23,152,211,.13);
}

.card-heading {
  font-size: 1.1rem; font-weight: 800; color: #222;
  margin-bottom: 16px; text-align: center;
}

/* Loading */
#loading-msg {
  text-align: center; padding: 36px 16px;
  color: #888; font-size: 15px;
  display: flex; flex-direction: column; align-items: center; gap: 14px;
}
.spinner {
  width: 36px; height: 36px;
  border: 4px solid #ddd;
  border-top-color: var(--brand);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Name grid */
#name-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 10px;
  max-height: 380px;
  overflow-y: auto;
  padding: 4px;
}
.name-btn {
  padding: 14px 10px; border: 2px solid #ddd; border-radius: 12px;
  cursor: pointer; font-size: 15px; font-family: 'Nunito', sans-serif;
  background: #fafafa; text-align: center; transition: all .15s;
  color: #333; font-weight: 700; line-height: 1.2;
}
.name-btn:hover { border-color: var(--brand); background: #e8f5fd; color: var(--brand); }
.name-btn:active { transform: scale(.96); }

/* Fallback */
#fallback-section { display: none; }
.fallback-msg {
  font-size: 14px; color: #888; margin-bottom: 10px; text-align: center;
}
.inp-wrap {
  display: flex; gap: 10px; margin-top: 12px;
}
.inp-name {
  flex: 1; padding: 13px 14px; font-size: 16px;
  border: 2px solid #ddd; border-radius: 10px; outline: none;
  font-family: 'Nunito', sans-serif;
}
.inp-name:focus { border-color: var(--brand); }
.btn {
  padding: 13px 22px; border: none; border-radius: 10px;
  font-size: 15px; font-weight: 800; cursor: pointer;
  background: var(--brand); color: #fff; font-family: 'Nunito', sans-serif;
  transition: background .15s;
}
.btn:hover { background: var(--brand-dk); }
.btn:active { transform: scale(.97); }

.error-msg {
  margin-top: 14px; padding: 10px 14px;
  background: #fff3cd; border-radius: 8px;
  font-size: 14px; color: #856404; text-align: center; display: none;
}
</style>
</head>
<body>

<div class="logo">📚</div>
<h1>Reading Assessment</h1>
<p class="sub">Wallscourt Farm Academy</p>

<div class="card">
  <!-- Loading state -->
  <div id="loading-msg">
    <div class="spinner"></div>
    <span>Loading class list…</span>
  </div>

  <!-- Name grid (shown when loaded) -->
  <div id="name-section" style="display:none">
    <p class="card-heading">Tap your name to begin</p>
    <div id="name-grid"></div>
    <p style="text-align:center;margin-top:14px;font-size:13px;color:#aaa;">
      Can't find your name?
      <button onclick="showFallback()" style="border:none;background:none;color:var(--brand);font-weight:700;cursor:pointer;font-size:13px;font-family:inherit;">Type it instead</button>
    </p>
  </div>

  <!-- Fallback (type name) -->
  <div id="fallback-section">
    <p class="card-heading">Type your first name</p>
    <p class="fallback-msg">We couldn't load the class list. Please type your name to continue.</p>
    <div class="inp-wrap">
      <input type="text" id="inp-name" class="inp-name" placeholder="First name Surname" autocomplete="off">
      <button class="btn" onclick="startFallback()">Start →</button>
    </div>
  </div>

  <div class="error-msg" id="error-msg">Something went wrong. Please try again or ask your teacher.</div>
</div>

<script>
const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbxQxxaRnYIz4VlRhzy55a2Et5FjERErpuJTQi6nV8aom5UCxv0D13WvPKkBLAlwkyskBA/exec';

// Assessment URL map
const ASSESSMENT_URLS = {
  summer: 'index.html',
  autumn: 'autumn/index.html',
  ks1:    'ks1/index.html'
};

let groupsData = null; // { groups: [...], pupils: [...] }

// Fetch groups config via JSONP
(function fetchGroups() {
  const cb = 'cb_' + Date.now();
  const script = document.createElement('script');
  const timer = setTimeout(() => {
    cleanup();
    showFallback();
  }, 12000);

  function cleanup() {
    clearTimeout(timer);
    delete window[cb];
    if (script.parentNode) document.body.removeChild(script);
  }

  window[cb] = function(data) {
    cleanup();
    if (data && Array.isArray(data.pupils) && data.pupils.length > 0) {
      groupsData = data;
      renderNameGrid(data.pupils);
    } else {
      showFallback();
    }
  };

  script.onerror = function() { cleanup(); showFallback(); };
  script.src = BACKEND_URL + '?action=getgroups&callback=' + cb;
  document.body.appendChild(script);
})();

function renderNameGrid(pupils) {
  document.getElementById('loading-msg').style.display = 'none';
  document.getElementById('name-section').style.display = 'block';

  const grid = document.getElementById('name-grid');
  const sorted = [...pupils].sort((a,b) => a.name.localeCompare(b.name));
  grid.innerHTML = sorted.map(p =>
    `<button class="name-btn" data-name="${p.name.replace(/"/g,'&quot;')}" data-group="${(p.group||'').replace(/"/g,'&quot;')}">${p.name}</button>`
  ).join('');

  grid.addEventListener('click', function(e) {
    const btn = e.target.closest('.name-btn');
    if (!btn) return;
    selectPupil(btn.dataset.name, btn.dataset.group);
  });
}

function selectPupil(name, groupId) {

  const group = groupsData && groupsData.groups
    ? groupsData.groups.find(g => g.id === groupId)
    : null;

  if (!group) {
    routeTo(name, 'summer', [0,1,2]);
    return;
  }

  routeTo(name, group.assessment, Array.isArray(group.texts) ? group.texts : [0,1,2]);
}

function routeTo(name, assessment, texts) {
  const url = ASSESSMENT_URLS[assessment] || 'index.html';
  localStorage.setItem('ra_preload', JSON.stringify({ name, assessment, texts }));
  window.location.href = url;
}

function showFallback() {
  document.getElementById('loading-msg').style.display = 'none';
  document.getElementById('name-section').style.display = 'none';
  document.getElementById('fallback-section').style.display = 'block';
}

function startFallback() {
  const name = document.getElementById('inp-name').value.trim();
  if (!name) {
    document.getElementById('inp-name').focus();
    return;
  }
  // No group routing possible — go to default summer assessment with no preload
  // (assessment will show its own name picker from backend)
  // We do set a minimal preload so the name is carried through
  localStorage.setItem('ra_preload', JSON.stringify({ name, assessment: 'summer', texts: [0,1,2] }));
  window.location.href = 'index.html';
}
</script>
</body>
</html>
